name: Check PR Overlap

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  check-overlap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup GitHub CLI
        run: |
          # GitHub CLI is pre-installed on ubuntu-latest, verify it's available
          gh --version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run overlap check
        id: overlap-check
        continue-on-error: true
        run: |
          chmod +x .github/scripts/check-overlap.sh
          .github/scripts/check-overlap.sh \
            "${{ github.event.pull_request.number }}" \
            "${{ github.event.pull_request.base.sha }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post overlap findings as comment
        if: steps.overlap-check.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body;

            try {
              body = fs.readFileSync('/tmp/overlap-report.md', 'utf8');
            } catch (error) {
              body = '⚠️ Overlap check failed but could not read report. Please run `/utils:review-ai-helpers-overlap` locally.';
            }

            // Find existing overlap comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existingComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Potential Overlap Detected')
            );

            if (existingComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: body
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

      - name: Post success message
        if: steps.overlap-check.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            // Find existing overlap comment and delete it if no overlaps found
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existingComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Potential Overlap Detected')
            );

            if (existingComment) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id
              });
            }

            // Optionally post a success comment
            console.log('No overlaps detected');

      - name: Check result
        if: steps.overlap-check.outcome == 'failure'
        run: |
          echo "::warning::Potential overlaps detected. Review the PR comment for details."
          echo "Run '/utils:review-ai-helpers-overlap' locally for detailed semantic analysis."
          # Don't fail the workflow, just warn
          exit 0
